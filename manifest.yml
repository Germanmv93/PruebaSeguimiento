modules:
  jira:projectPage:
    - key: seguimiento-project-page
      title: Seguimiento de Servicios
      layout: basic
      resource: portal-ui
      resolver:
        function: main
  jiraServiceManagement:portalRequestCreatePanel:
    - key: seguimiento-portal-panel
      title: Seguimiento de Servicios
      resource: portal-ui
      resolver:
        function: main
  function:
    - key: main
      handler: index.handler
resources:
  - key: portal-ui
    path: static/portal-ui/build
    tunnel:
      port: 3000
permissions:
  scopes:
    - read:jira-user
    - read:jira-work
    - write:jira-work
  egress:
    addresses: []
app:
  id: ari:cloud:ecosystem::app/96826261-e4dd-4ff2-93ab-6236a5f28342
  runtime:
    name: nodejs22.x
